<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Memorylayer{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --panel: rgba(11, 11, 15, 0.9);
      --panel-soft: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.09);
      --text: #fafafa;
      --muted: #b3b3bc;
      --soft: #7a7a85;
      --accent: #ffffff;
      --accent-ink: #0a0a0a;
      --line: rgba(255, 255, 255, 0.06);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 50% -10%, rgba(255, 255, 255, 0.11), transparent 22%),
        linear-gradient(180deg, #0b0b0d, #09090b 24%, #09090b);
      color: var(--text);
      font: 14px/1.6 "Manrope", ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
    a { color: inherit; text-decoration: none; }
    .shell { max-width: 1220px; margin: 0 auto; padding: 20px 28px 80px; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 0 18px;
      backdrop-filter: blur(16px);
      background: linear-gradient(180deg, rgba(9, 9, 11, 0.82), rgba(9, 9, 11, 0.42), transparent);
    }
    .brand { display: flex; gap: 12px; align-items: center; }
    .brand-mark {
      position: relative;
      width: 36px; height: 36px; border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.18), transparent 45%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.015));
      box-shadow: var(--shadow);
    }
    .brand-mark::before {
      content: "";
      position: absolute;
      inset: 9px;
      border-radius: 999px;
      border: 1.5px solid rgba(255, 255, 255, 0.88);
    }
    .brand-mark::after {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      animation: pulse-core 5s ease-in-out infinite;
    }
    .brand h1 { margin: 0; font-size: 17px; font-weight: 600; letter-spacing: -0.02em; }
    .brand p { margin: 0; color: var(--soft); font-size: 11px; }
    .nav { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .nav a, .button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.025);
      color: var(--text);
      cursor: pointer;
      transition: border-color 140ms ease, background 140ms ease, transform 140ms ease;
    }
    .nav a:hover, .button:hover {
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-1px);
    }
    .button.primary {
      border-color: rgba(255, 255, 255, 0.85);
      background: #fafafa;
      color: var(--accent-ink);
      font-weight: 600;
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: 32px;
      margin-bottom: 44px;
      min-height: calc(100svh - 96px);
      align-items: end;
      border-bottom: 1px solid var(--line);
    }
    .hero h2 {
      margin: 0 0 16px;
      font-size: clamp(42px, 7vw, 92px);
      line-height: 0.94;
      letter-spacing: -0.055em;
      max-width: 9ch;
    }
    .hero p { margin: 0 0 16px; color: var(--muted); max-width: 54ch; font-size: 15px; }
    .hero .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      margin-bottom: 16px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.025);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .hero-copy {
      padding: 0 0 40px;
      animation: fade-up 700ms ease both;
    }
    .hero-visual {
      position: relative;
      min-height: 640px;
      border-left: 1px solid var(--line);
      animation: fade-up 900ms ease both;
      overflow: hidden;
    }
    .hero-visual::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), transparent 28%),
        linear-gradient(90deg, transparent 0, rgba(255,255,255,0.04) 52%, transparent 100%);
      opacity: 0.5;
      pointer-events: none;
    }
    .orbital-stage {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
    }
    .orbital-core {
      position: relative;
      width: min(460px, 82%);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.75), rgba(255,255,255,0.18) 16%, rgba(255,255,255,0.02) 34%, transparent 58%),
        radial-gradient(circle at 50% 52%, rgba(95, 132, 255, 0.22), transparent 48%);
      filter: drop-shadow(0 0 80px rgba(255,255,255,0.08));
    }
    .orbital-core::before,
    .orbital-core::after {
      content: "";
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      animation: slow-spin 22s linear infinite;
    }
    .orbital-core::after {
      inset: 22%;
      border-style: dashed;
      opacity: 0.7;
      animation-direction: reverse;
      animation-duration: 28s;
    }
    .signal-stack {
      position: absolute;
      right: 28px;
      bottom: 28px;
      width: min(320px, calc(100% - 56px));
      display: grid;
      gap: 12px;
      z-index: 1;
    }
    .signal-line {
      padding: 14px 16px;
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
    }
    .signal-line strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .signal-line span {
      color: var(--soft);
      font-size: 12px;
    }
    .metrics {
      display: grid;
      gap: 0;
      border-top: 1px solid var(--line);
    }
    .metric, .card {
      padding: 24px 0;
    }
    .metric h3, .card h3 {
      margin: 0 0 8px;
      font-size: 15px;
      letter-spacing: -0.02em;
    }
    .metric p, .card p, .subtle { color: var(--muted); margin: 0; }
    .metric {
      border-bottom: 1px solid var(--line);
    }
    .grid {
      display: grid;
      gap: 0 28px;
    }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .stat {
      font-size: 30px;
      font-weight: 600;
      letter-spacing: -0.04em;
      margin-bottom: 6px;
    }
    .workspace-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .workspace-head h2 { margin: 0 0 6px; font-size: 28px; }
    .list {
      display: grid;
      gap: 10px;
    }
    .item {
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
    }
    .item .meta, .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
      color: var(--soft);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .badge {
      display: inline-flex;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
    }
    form { display: grid; gap: 10px; }
    input, textarea, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.025);
      color: var(--text);
    }
    textarea { min-height: 120px; resize: vertical; }
    .split {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 28px;
    }
    .empty {
      border: 1px dashed rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 20px;
      color: var(--muted);
      text-align: center;
    }
    .warning {
      color: #f4d28c;
      font-size: 12px;
    }
    .code-block {
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.025);
      color: #e4e4e7;
      font: 12px/1.6 "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .flash {
      margin-bottom: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
    }
    .flash.success {
      border-color: rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.04);
    }
    .flash.error {
      border-color: rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.04);
    }
    .section-title {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin: 44px 0 12px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .section-title h2 {
      margin: 0 0 6px;
      font-size: 30px;
      letter-spacing: -0.03em;
    }
    code {
      font: 12px/1.5 "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #e4e4e7;
    }
    .public-rail {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 28px;
      margin: 36px 0 0;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }
    .public-rail > div {
      padding-right: 12px;
    }
    .public-rail strong {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      letter-spacing: -0.02em;
    }
    .detail-block {
      padding: 24px 0;
      border-top: 1px solid var(--line);
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 28px;
      align-items: start;
    }
    .terminal-surface {
      padding: 18px 0 0;
      border-top: 1px solid var(--line);
    }
    .terminal-row {
      display: grid;
      grid-template-columns: 124px 1fr;
      gap: 18px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 12px;
    }
    .terminal-row span {
      color: var(--soft);
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .surface-block {
      padding: 24px 0;
      border-top: 1px solid var(--line);
    }
    .section-stack {
      display: grid;
      gap: 0;
    }
    .fade-reveal {
      animation: fade-up 700ms ease both;
    }
    @keyframes pulse-core {
      0%, 100% { transform: scale(1); opacity: 0.92; }
      50% { transform: scale(1.08); opacity: 1; }
    }
    @keyframes slow-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 960px) {
      .shell { padding: 16px 18px 56px; }
      .hero, .split, .grid.two, .grid.three, .detail-grid, .public-rail { grid-template-columns: 1fr; }
      .hero {
        min-height: auto;
        gap: 20px;
      }
      .hero-visual {
        min-height: 440px;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
      .terminal-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <a href="/" class="brand">
        <div class="brand-mark"></div>
        <div>
          <h1>Memorylayer</h1>
          <p>Hosted memory runtime for agents</p>
        </div>
      </a>
      <div class="nav">
        <a href="/docs">Docs</a>
        <a href="/agents">Agents</a>
        {% if current_user_id %}
          <a href="/app">Dashboard</a>
          <a href="/logout">Log out</a>
        {% else %}
          <a href="/login">Log in</a>
          <a href="/login/github" class="button primary">Continue with GitHub</a>
        {% endif %}
      </div>
    </div>
    {% if flash %}
      <div class="flash {{ flash.kind }}">{{ flash.message }}</div>
    {% endif %}
    {% block body %}{% endblock %}
  </div>
</body>
</html>
