<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Engram Cloud{% endblock %}</title>
  <style>
    :root {
      --bg: #07111d;
      --panel: rgba(14, 24, 42, 0.88);
      --panel-2: rgba(18, 32, 57, 0.82);
      --border: rgba(148, 163, 184, 0.18);
      --text: #ecf4ff;
      --muted: #8ca3c7;
      --accent: #22d3ee;
      --accent-2: #34d399;
      --red: #fb7185;
      --shadow: 0 24px 50px rgba(2, 6, 23, 0.34);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(34, 211, 238, 0.14), transparent 32%),
        radial-gradient(circle at bottom right, rgba(52, 211, 153, 0.08), transparent 24%),
        linear-gradient(180deg, #09111d, #07111d);
      color: var(--text);
      font: 14px/1.55 Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
    a { color: inherit; text-decoration: none; }
    .shell { max-width: 1180px; margin: 0 auto; padding: 24px; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0 24px;
    }
    .brand { display: flex; gap: 12px; align-items: center; }
    .brand-mark {
      width: 40px; height: 40px; border-radius: 14px;
      border: 1px solid rgba(125, 211, 252, 0.28);
      background:
        radial-gradient(circle at 28% 30%, rgba(125, 211, 252, 0.42), transparent 38%),
        linear-gradient(135deg, rgba(34, 211, 238, 0.18), rgba(52, 211, 153, 0.12));
      box-shadow: var(--shadow);
    }
    .brand h1 { margin: 0; font-size: 20px; }
    .brand p { margin: 0; color: var(--muted); font-size: 12px; }
    .nav { display: flex; gap: 10px; align-items: center; }
    .nav a, .button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
    }
    .button.primary {
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #03111c;
      font-weight: 600;
    }
    .hero, .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }
    .hero {
      padding: 32px;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
      margin-bottom: 24px;
    }
    .hero h2 {
      margin: 0 0 16px;
      font-size: clamp(34px, 6vw, 62px);
      line-height: 0.95;
      letter-spacing: -0.05em;
      max-width: 9ch;
    }
    .hero p { margin: 0 0 16px; color: var(--muted); max-width: 62ch; }
    .metrics {
      display: grid;
      gap: 12px;
    }
    .metric, .card {
      padding: 18px;
    }
    .metric h3, .card h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }
    .metric p, .card p, .subtle { color: var(--muted); margin: 0; }
    .grid {
      display: grid;
      gap: 18px;
    }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .stat {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .workspace-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .workspace-head h2 { margin: 0 0 6px; font-size: 28px; }
    .list {
      display: grid;
      gap: 10px;
    }
    .item {
      padding: 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(8, 18, 34, 0.64);
    }
    .item .meta, .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .badge {
      display: inline-flex;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(34, 211, 238, 0.08);
    }
    form { display: grid; gap: 10px; }
    input, textarea, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(8, 18, 34, 0.72);
      color: var(--text);
    }
    textarea { min-height: 120px; resize: vertical; }
    .split {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
    }
    .empty {
      border: 1px dashed var(--border);
      border-radius: 16px;
      padding: 20px;
      color: var(--muted);
      text-align: center;
    }
    .warning {
      color: #fcd34d;
      font-size: 12px;
    }
    .flash {
      margin-bottom: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(8, 18, 34, 0.72);
    }
    .flash.success {
      border-color: rgba(52, 211, 153, 0.35);
      background: rgba(16, 45, 40, 0.55);
    }
    .flash.error {
      border-color: rgba(251, 113, 133, 0.35);
      background: rgba(52, 18, 27, 0.55);
    }
    @media (max-width: 960px) {
      .hero, .split, .grid.two, .grid.three { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <a href="/" class="brand">
        <div class="brand-mark"></div>
        <div>
          <h1>Engram Cloud</h1>
          <p>Hosted memory workspaces for agents and teams</p>
        </div>
      </a>
      <div class="nav">
        {% if current_user_id %}
          <a href="/app">Dashboard</a>
          <a href="/logout">Log out</a>
        {% else %}
          <a href="/login">Log in</a>
          <a href="/login/github" class="button primary">Continue with GitHub</a>
        {% endif %}
      </div>
    </div>
    {% if flash %}
      <div class="flash {{ flash.kind }}">{{ flash.message }}</div>
    {% endif %}
    {% block body %}{% endblock %}
  </div>
</body>
</html>
